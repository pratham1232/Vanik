kind = "mobile"
previewPath = "/"
title = "Vanik"
version = "1.0.0"
id = "artifacts/vanik"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 19202

[services.development]
run = "pnpm --filter @workspace/vanik run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vanik", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/vanik", "run", "serve" ]

[services.env]
PORT = "19202"
BASE_PATH = "/"
